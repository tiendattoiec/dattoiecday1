<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dattoeic - Luyện từ vựng TOEIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #37352f;
            --bg-color: #ffffff;
            --border-color: #e9e9e8;
            --blue: #2383e2;
            --red: #eb5757;
            --green: #0f7b6c;
            --gray-bg: #f7f6f3;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header & Sticky Status */
        header {
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-square {
            background: #000;
            color: #fff;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-weight: 700;
            font-size: 20px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .timer {
            color: var(--red);
            font-variant-numeric: tabular-nums;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 650px;
            padding: 40px 20px;
            flex-grow: 1;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--gray-bg);
            border-radius: 10px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--blue);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Question Area */
        .question-card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .sentence {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .blank {
            display: inline-block;
            min-width: 80px;
            border-bottom: 2px solid var(--text-color);
            text-align: center;
            padding: 0 5px;
            color: var(--blue);
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 10px;
            text-align: left;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-btn:hover {
            background: var(--gray-bg);
        }

        .option-btn.correct {
            background: var(--green) !important;
            color: white;
            border-color: var(--green);
        }

        .option-btn.wrong {
            background: var(--red) !important;
            color: white;
            border-color: var(--red);
        }

        /* Result Screen */
        .result-screen {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 8px solid var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            font-weight: 700;
        }

        .btn-reset {
            margin-top: 30px;
            background: var(--text-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-square">D</div>
            <span class="logo-text">Dattoeic</span>
        </div>
        <div class="status-bar">
            <div id="progress-text">1/30</div>
            <div class="timer" id="timer">10:00</div>
        </div>
    </header>

    <div class="container">
        <div id="quiz-area">
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>

            <div class="question-card">
                <div class="sentence" id="sentence-box">
                    <!-- Câu hỏi hiện ở đây -->
                </div>
            </div>

            <div class="options-grid" id="options-box">
                <!-- Đáp án hiện ở đây -->
            </div>
        </div>

        <div id="result-screen" class="result-screen">
            <h1>Hoàn thành!</h1>
            <div class="score-circle" id="score-display">0/0</div>
            <p id="remark">Cố gắng hơn nữa nhé!</p>
            <button class="btn-reset" onclick="location.reload()">Làm đề mới</button>
        </div>
    </div>

    <script>
        // Dữ liệu từ vựng từ yêu cầu
        const rawData = `
résumé	Please submit your résumé to the HR department.
opening	There is a job opening in the marketing team.
requirement	A degree in finance is a basic requirement.
qualified	She is highly qualified for the manager position.
appliance	The store sells various kitchen appliances.
meet	The candidate meets all the criteria for the job.
satisfy	We strive to satisfy our customers' needs.
qualify	You qualify for a discount on your first order.
candidate	We interviewed several candidates today.
applicant	Each applicant must provide two references.
confidence	He answered the questions with confidence.
confident	Be confident during your job interview.
highly	The book is highly recommended by experts.
professional	You should maintain a professional attitude.
interview	The interview will take about 30 minutes.
hire	The company plans to hire ten new employees.
training	All new staff must undergo safety training.
reference	Please provide a professional reference.
position	He applied for the accountant position.
achievement	Winning the award was a great achievement.
impressed	The manager was impressed by his skills.
excellent	She received an excellent performance review.
identify	Can you identify the person in this photo?
identification	You must show your identification at the gate.
association	She is a member of the teachers' association.
condition	The working conditions here are very good.
employment	They are looking for permanent employment.
employee	The company has over 500 employees.
fire	He was fired because of poor performance.
employer	Your former employer wrote a good reference.
unemployment	The unemployment rate has decreased recently.
lack	There is a lack of funding for the project.
managerial	She has many years of managerial experience.
manage	He managed to finish the report on time.
familiar	I am familiar with this software.
unfamiliar	He was unfamiliar with the local customs.
attract	The job offer attracted many applicants.
concerned	Management is concerned about the costs.
consultant	He works as a financial consultant.
consult	You should consult a lawyer before signing.
consultation	The first consultation is free of charge.
degree	She has a bachelor's degree in nursing.
recruit	They are trying to recruit more staff.
certificate	You will receive a certificate after the course.
occupation	Please state your occupation on the form.
job	He is looking for a part-time job.
wage	The minimum wage has increased this year.
application form	Fill out the application form completely.
career	She plans to pursue a career in law.
completion	The project is nearing completion.
fair	We attended a job fair last week.
graduation	He started working right after graduation.
in fact	In fact, we have already met before.
job fair	Many students go to job fairs to find work.
job offer	She received a job offer from a big bank.
list	Your name is on the waiting list.
newcomer	She is a newcomer to the sales department.
part-time	He has a part-time job as a delivery driver.
previous job	What did you do in your previous job?
secretary	The secretary is scheduling the meeting.
send in	Remember to send in your application.
tidy	Please keep your desk tidy.
trainee	The trainee is learning how to use the system.
apply for	I want to apply for the sales manager role.
decade	The company was founded a decade ago.
employ	The factory will employ 500 new workers.
minimum	The minimum age is 18.
party	Which party are you voting for?
profession	He chose the teaching profession.
achieve one's goal	He finally achieved his goal of sleeping for 12 hours straight.
dress formally	The intern decided to dress formally but wore bright red socks.
dressed in suit	He was dressed in suit just to go out and buy a loaf of bread.
figure out	I can't figure out how to use this machine.
full time work	She thought full time work meant browsing social media for 8 hours.
job opportunity	Seeing a job opportunity, he applied despite having no skills at all.
job search	His job search consisted mostly of looking at the office snacks.
job seeker	The hungry job seeker only applied to companies that offered free lunch.
letter of recommendation	His mom wrote him a letter of recommendation for his first part-time job.
pay raise	He asked for a pay raise just so he could afford more milk tea.
reapply	After being rejected, he decided to reapply with a fake mustache.
recommendation letter	A strong recommendation letter can help you get the dream job.
reference letter	He forgot to ask his boss for a reference letter before quitting.
set up an interview	The HR manager set up an interview at a cat cafe.
take an examination	He had to take an examination but forgot his own name.
training center	The training center was just a room with a TV and some snacks.
waiting room	He fell asleep in the waiting room and missed his turn.
cover letter	Write a clear cover letter.
energetic	She is so energetic that she runs to work every morning.
enthusiastic	The team was very enthusiastic about the new idea.
match	I watched a football match last night.
sign up for	I decided to sign up for a gym membership.
talented	She is a talented young musician.
visiting	The visiting students were confused by the local slang.
fluent in	He claims to be fluent in Sarcasm but no one understands him.
human resources	The human resources department organized a pizza party instead of raises.
in the field of	She is an expert in the field of taking long naps.
lack confidence	He lacked confidence so he asked his cat for fashion advice.
paycheck	Her entire paycheck disappeared after one visit to the mall.
send a notification	The app sent a notification that I have been sitting for 10 hours.
wanted	The "Help Wanted" sign was ignored by everyone at the beach.`;

        // Tiền xử lý dữ liệu
        let allData = rawData.trim().split('\n').map(line => {
            const [word, sentence] = line.split('\t');
            return { word: word.trim(), sentence: sentence.trim() };
        });

        // Chọn ngẫu nhiên 30 câu hoặc toàn bộ
        let quizData = [];
        const poolSize = Math.min(30, allData.length);
        const shuffledPool = [...allData].sort(() => 0.5 - Math.random());
        quizData = shuffledPool.slice(0, poolSize);

        let currentIndex = 0;
        let score = 0;
        let timeLeft = 600; // 10 phút
        let timerId;
        let canClick = true;

        const sentenceBox = document.getElementById('sentence-box');
        const optionsBox = document.getElementById('options-box');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const timerDisplay = document.getElementById('timer');

        function initQuiz() {
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function renderQuestion() {
            canClick = true;
            const currentItem = quizData[currentIndex];
            
            // Cập nhật Progress
            const progressPercent = ((currentIndex) / quizData.length) * 100;
            progressFill.style.width = `${progressPercent}%`;
            progressText.innerText = `${currentIndex + 1}/${quizData.length}`;

            // Xử lý câu ví dụ (thay thế từ bằng gạch dưới)
            let displaySentence = currentItem.sentence;
            const wordToHide = currentItem.word;
            
            // Regex để thay thế từ (không phân biệt hoa thường)
            const regex = new RegExp(`\\b${wordToHide}\\b`, 'gi');
            if (displaySentence.includes('______')) {
                // Giữ nguyên nếu đã có gạch dưới
            } else {
                displaySentence = displaySentence.replace(regex, '<span class="blank" id="current-blank">______</span>');
            }
            // Nếu dùng regex mà không tìm thấy (do biến thể), tìm thủ công đơn giản
            if (!displaySentence.includes('id="current-blank"')) {
                displaySentence = displaySentence.replace(wordToHide, '<span class="blank" id="current-blank">______</span>');
            }

            sentenceBox.innerHTML = displaySentence;

            // Tạo đáp án (1 đúng, 3 sai ngẫu nhiên từ danh sách hiện tại)
            let options = [currentItem.word];
            let otherWords = quizData.filter(item => item.word !== currentItem.word).map(item => item.word);
            let shuffledOthers = otherWords.sort(() => 0.5 - Math.random());
            options.push(...shuffledOthers.slice(0, 3));
            options.sort(() => 0.5 - Math.random());

            optionsBox.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleSelect(opt, btn);
                optionsBox.appendChild(btn);
            });
        }

        function handleSelect(selectedWord, btnElement) {
            if (!canClick) return;
            canClick = false;

            const correctWord = quizData[currentIndex].word;
            const blank = document.getElementById('current-blank');
            if (blank) blank.innerText = selectedWord;

            const buttons = document.querySelectorAll('.option-btn');
            
            if (selectedWord === correctWord) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                // Hiện đáp án đúng
                buttons.forEach(btn => {
                    if (btn.innerText === correctWord) btn.classList.add('correct');
                });
            }

            setTimeout(() => {
                currentIndex++;
                if (currentIndex < quizData.length) {
                    renderQuestion();
                } else {
                    endGame();
                }
            }, 1200);
        }

        function endGame() {
            clearInterval(timerId);
            document.getElementById('quiz-area').classList.add('hidden');
            const resultScreen = document.getElementById('result-screen');
            resultScreen.style.display = 'block';
            
            const finalScore = document.getElementById('score-display');
            finalScore.innerText = `${score}/${quizData.length}`;

            const remark = document.getElementById('remark');
            const percent = (score / quizData.length) * 100;
            if (percent >= 90) remark.innerText = "Tuyệt vời! Bạn là bậc thầy từ vựng.";
            else if (percent >= 70) remark.innerText = "Rất tốt! Tiếp tục phát huy nhé.";
            else remark.innerText = "Cố gắng luyện tập thêm mỗi ngày cùng Dattoeic nhé!";
        }

        // Khởi chạy
        initQuiz();

    </script>
</body>
</html>
